services:
  - type: web
    name: leadgen-backend
    runtime: python
    rootDir: ai-lead-generator/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 2.1.0
      - key: DATABASE_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
    autoDeploy: true
